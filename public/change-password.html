<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set New Password — Compliance Monitoring System</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="auth-page">

<div class="auth-card">
  <div class="auth-brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/>
      </svg>
    </div>
    <h1>Set Your Password</h1>
    <p id="welcomeMsg">Welcome! Please create a new password to continue.</p>
  </div>

  <div id="msg" class="message"></div>

  <div class="pw-requirements">
    <p>Password must include:</p>
    <div class="pw-req-item" id="req-length">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      At least 8 characters
    </div>
    <div class="pw-req-item" id="req-upper">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      At least one uppercase letter
    </div>
    <div class="pw-req-item" id="req-number">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      At least one number
    </div>
    <div class="pw-req-item" id="req-match">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      Passwords match
    </div>
  </div>

  <form id="changeForm" novalidate>
    <div class="form-group">
      <label for="newPassword">New Password</label>
      <div class="input-wrap">
        <input type="password" id="newPassword" placeholder="Enter new password" required />
        <button type="button" class="toggle-pw" id="toggleNew" aria-label="Show/hide">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="form-group">
      <label for="confirmPassword">Confirm Password</label>
      <div class="input-wrap">
        <input type="password" id="confirmPassword" placeholder="Re-enter new password" required />
        <button type="button" class="toggle-pw" id="toggleConfirm" aria-label="Show/hide">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <button type="submit" class="btn btn-primary" id="submitBtn">
      Set Password &amp; Continue
    </button>
  </form>
</div>

<script src="/js/auth.js"></script>
<script>
  const user = requireAuth();
  if (user && !user.first_login) {
    window.location.href = "/dashboard.html";
  }
  if (user) {
    document.getElementById("welcomeMsg").textContent =
      `Welcome, ${user.name}! Please create a new password to continue.`;
  }

  function makeToggle(btnId, inputId) {
    document.getElementById(btnId).addEventListener("click", () => {
      const inp = document.getElementById(inputId);
      const show = inp.type === "password";
      inp.type = show ? "text" : "password";
    });
  }
  makeToggle("toggleNew",     "newPassword");
  makeToggle("toggleConfirm", "confirmPassword");

  const checks = {
    length: (v) => v.length >= 8,
    upper:  (v) => /[A-Z]/.test(v),
    number: (v) => /\d/.test(v),
  };

  const checkIcon = {
    ok:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`,
    fail: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`
  };

  function updateReqs() {
    const pw   = document.getElementById("newPassword").value;
    const conf = document.getElementById("confirmPassword").value;
    const match = pw === conf && pw.length > 0;

    ["length", "upper", "number"].forEach((key) => {
      const el = document.getElementById(`req-${key}`);
      const ok = checks[key](pw);
      el.classList.toggle("met", ok);
      el.querySelector("svg").outerHTML; // force
      el.innerHTML = (ok ? checkIcon.ok : checkIcon.fail) +
        el.innerHTML.replace(/<svg[\s\S]*?<\/svg>/, "");
    });

    const matchEl = document.getElementById("req-match");
    matchEl.classList.toggle("met", match);
    matchEl.innerHTML = (match ? checkIcon.ok : checkIcon.fail) + " Passwords match";
  }

  document.getElementById("newPassword").addEventListener("input", updateReqs);
  document.getElementById("confirmPassword").addEventListener("input", updateReqs);

  document.getElementById("changeForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    hideMessage("msg");

    const newPw  = document.getElementById("newPassword").value;
    const confPw = document.getElementById("confirmPassword").value;

    if (newPw.length < 8) {
      showMessage("msg", "Password must be at least 8 characters.", "error"); return;
    }
    if (!/[A-Z]/.test(newPw)) {
      showMessage("msg", "Password must contain at least one uppercase letter.", "error"); return;
    }
    if (!/\d/.test(newPw)) {
      showMessage("msg", "Password must contain at least one number.", "error"); return;
    }
    if (newPw !== confPw) {
      showMessage("msg", "Passwords do not match.", "error"); return;
    }

    const btn = document.getElementById("submitBtn");
    btn.disabled = true;
    btn.textContent = "Updating…";

    try {
      const res = await apiFetch("/api/auth/change-password", {
        method: "POST",
        body: JSON.stringify({ newPassword: newPw })
      });
      if (!res) return;

      const data = await res.json();

      if (!res.ok) {
        showMessage("msg", data.message || "Failed to update password.", "error");
        return;
      }

      // Update cached user: mark first_login as false
      const currentUser = getUser();
      currentUser.first_login = false;
      localStorage.setItem("cms_user", JSON.stringify(currentUser));

      showMessage("msg", "Password updated! Redirecting…", "success");
      setTimeout(() => { window.location.href = "/dashboard.html"; }, 1200);
    } catch {
      showMessage("msg", "Network error. Please try again.", "error");
    } finally {
      btn.disabled = false;
      btn.textContent = "Set Password & Continue";
    }
  });
</script>
</body>
</html>
